<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yumurcakistan | Ana Komuta Merkezi</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { border: 1px solid #00ff41; padding: 40px; box-shadow: 0 0 20px #00ff41; background: rgba(0, 255, 65, 0.05); text-align: center; max-width: 600px; }
        h1 { font-size: 2em; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; }
        .status { color: #fff; margin-bottom: 30px; font-size: 1.1em; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .access-denied { color: #ff0000; font-weight: bold; }
        .footer { margin-top: 50px; font-size: 0.8em; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>YUMURCAKİSTAN</h1>
        <p class="status">SİSTEM DURUMU: <span style="color: #00ff41;">ÇEVRİMİÇİ</span></p>
        <hr style="border: 0.5px solid #00ff41;">
        <p>Erişim Onaylandı: <strong>KURUCU VE GİZLİ ÖRGÜT LİDERİ</strong></p>
        <p class="blink">Giriş Yapılıyor...</p>
        <div id="log">
            <p>> Academia Verileri Yükleniyor...</p>
            <p>> Hassams Operasyon Birimleri Hazır.</p>
            <p>> Whisperr Gözlem Noktaları Aktif.</p>
        </div>
    </div>
    <p class="footer">© 2026 Yumurcakistan Arşivleri - İzinsiz Erişim Yasaktır.</p>
</body>
</html>
